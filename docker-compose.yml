name: bybit-bot

services:
  bybit-bot:
    container_name: bybit-bot
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOTNET_VERSION: 8.0
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bybit-bot-net

networks:
  bybit-bot-net:
    driver: bridge
