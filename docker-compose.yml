name: bybit-bot

services:
  bybit-bot:
    container_name: bybit-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bybit-bot-net

networks:
  bybit-bot-net:
    driver: bridge
